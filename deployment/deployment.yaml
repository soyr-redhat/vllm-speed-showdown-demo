apiVersion: apps/v1
kind: Deployment
metadata:
  name: speed-backend
  namespace: speed-showdown
  labels:
    app: speed-backend
    pillar: inference-vllm
  annotations:
    image.openshift.io/triggers: '[{"from":{"kind":"ImageStreamTag","name":"speed-backend:latest"},"fieldPath":"spec.template.spec.containers[?(@.name==\"backend\")].image"}]'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: speed-backend
  template:
    metadata:
      labels:
        app: speed-backend
    spec:
      volumes:
      - name: scoreboard-storage
        persistentVolumeClaim:
          claimName: scoreboard-storage
      containers:
      - name: backend
        image: image-registry.openshift-image-registry.svc:5000/speed-showdown/speed-backend:latest
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: VLLM_STANDARD_URL
          valueFrom:
            configMapKeyRef:
              name: speed-showdown-config
              key: vllm-standard-url
        - name: VLLM_OPTIMIZED_URL
          valueFrom:
            configMapKeyRef:
              name: speed-showdown-config
              key: vllm-optimized-url
        - name: VLLM_QUANTIZED_URL
          valueFrom:
            configMapKeyRef:
              name: speed-showdown-config
              key: vllm-quantized-url
        - name: VLLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: speed-showdown-secrets
              key: vllm-api-key
              optional: true
        - name: VLLM_STANDARD_MODEL
          valueFrom:
            configMapKeyRef:
              name: speed-showdown-config
              key: vllm-standard-model
        - name: VLLM_OPTIMIZED_MODEL
          valueFrom:
            configMapKeyRef:
              name: speed-showdown-config
              key: vllm-optimized-model
        - name: VLLM_QUANTIZED_MODEL
          valueFrom:
            configMapKeyRef:
              name: speed-showdown-config
              key: vllm-quantized-model
        - name: SCOREBOARD_PATH
          value: /data/scoreboard.json
        volumeMounts:
        - name: scoreboard-storage
          mountPath: /data
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: speed-backend
  namespace: speed-showdown
  labels:
    app: speed-backend
spec:
  selector:
    app: speed-backend
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: speed-backend
  namespace: speed-showdown
  labels:
    app: speed-backend
spec:
  to:
    kind: Service
    name: speed-backend
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: speed-frontend
  namespace: speed-showdown
  labels:
    app: speed-frontend
    pillar: inference-vllm
  annotations:
    image.openshift.io/triggers: '[{"from":{"kind":"ImageStreamTag","name":"speed-frontend:latest"},"fieldPath":"spec.template.spec.containers[?(@.name==\"frontend\")].image"}]'
spec:
  replicas: 2
  selector:
    matchLabels:
      app: speed-frontend
  template:
    metadata:
      labels:
        app: speed-frontend
    spec:
      containers:
      - name: frontend
        image: image-registry.openshift-image-registry.svc:5000/speed-showdown/speed-frontend:latest
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: speed-frontend
  namespace: speed-showdown
  labels:
    app: speed-frontend
spec:
  selector:
    app: speed-frontend
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: speed-showdown
  namespace: speed-showdown
  labels:
    app: speed-frontend
spec:
  to:
    kind: Service
    name: speed-frontend
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
