apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-standard
  namespace: user-sbowerma
  labels:
    app: vllm-standard
    vllm-type: standard
    kueue.x-k8s.io/queue-name: unreserved
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-standard
  template:
    metadata:
      labels:
        app: vllm-standard
        vllm-type: standard
        kueue.x-k8s.io/queue-name: unreserved
    spec:
      containers:
      - name: vllm
        image: vllm/vllm-openai:v0.6.2
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: HOME
          value: /tmp
        - name: HF_HOME
          value: /tmp/huggingface
        - name: VLLM_CACHE_ROOT
          value: /tmp/vllm
        - name: XDG_CACHE_HOME
          value: /tmp/cache
        - name: TMPDIR
          value: /tmp
        - name: OUTLINES_CACHE_DIR
          value: /tmp/outlines
        - name: FLASHINFER_WORKSPACE_DIR
          value: /tmp/flashinfer
        - name: HUGGING_FACE_HUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: speed-showdown-secrets
              key: hf-token
              optional: true
        args:
        - --model
        - mistralai/Mistral-7B-Instruct-v0.3
        - --host
        - "0.0.0.0"
        - --port
        - "8000"
        - --max-model-len
        - "2048"
        - --gpu-memory-utilization
        - "0.90"
        resources:
          requests:
            nvidia.com/mig-1g.18gb: "1"
          limits:
            nvidia.com/mig-1g.18gb: "1"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-standard
  namespace: user-sbowerma
  labels:
    app: vllm-standard
spec:
  selector:
    app: vllm-standard
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  type: ClusterIP
