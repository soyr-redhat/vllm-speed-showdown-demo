apiVersion: apps/v1
kind: Deployment
metadata:
  name: gemma4-frontend
  namespace: user-sbowerma
  labels:
    app: gemma4-frontend
  annotations:
    image.openshift.io/triggers: '[{"from":{"kind":"ImageStreamTag","name":"gemma4-frontend:latest"},"fieldPath":"spec.template.spec.containers[?(@.name==\"frontend\")].image"}]'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gemma4-frontend
  template:
    metadata:
      labels:
        app: gemma4-frontend
    spec:
      containers:
      - name: frontend
        image: image-registry.openshift-image-registry.svc:5000/user-sbowerma/gemma4-frontend:latest
        env:
        - name: VITE_API_URL
          value: "https://gemma4-backend-user-sbowerma.apps.ocp.cloud.rhai-tmm.dev"
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gemma4-frontend
  namespace: user-sbowerma
  labels:
    app: gemma4-frontend
spec:
  selector:
    app: gemma4-frontend
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: gemma4-demo
  namespace: user-sbowerma
  labels:
    app: gemma4-frontend
spec:
  to:
    kind: Service
    name: gemma4-frontend
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
