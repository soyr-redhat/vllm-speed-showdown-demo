apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-optimized-gemma4
  namespace: user-sbowerma
  labels:
    app: vllm-optimized-gemma4
    vllm-type: optimized
    kueue.x-k8s.io/queue-name: unreserved
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-optimized-gemma4
  template:
    metadata:
      labels:
        app: vllm-optimized-gemma4
        vllm-type: optimized
        kueue.x-k8s.io/queue-name: unreserved
    spec:
      containers:
      - name: vllm
        image: vllm/vllm-openai:v0.6.2
        ports:
        - containerPort: 8000
          name: http
        volumeMounts:
        - name: model-cache
          mountPath: /model-cache
        env:
        - name: HOME
          value: /tmp
        - name: HF_HOME
          value: /model-cache/huggingface
        - name: VLLM_CACHE_ROOT
          value: /tmp/vllm
        - name: XDG_CACHE_HOME
          value: /tmp/cache
        - name: TMPDIR
          value: /tmp
        - name: OUTLINES_CACHE_DIR
          value: /tmp/outlines
        - name: FLASHINFER_WORKSPACE_DIR
          value: /tmp/flashinfer
        - name: HUGGING_FACE_HUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: speed-showdown-secrets
              key: hf-token
              optional: true
        args:
        - --model
        - google/gemma-4-31b-it
        - --host
        - "0.0.0.0"
        - --port
        - "8000"
        - --max-model-len
        - "8192"
        - --gpu-memory-utilization
        - "0.98"
        # Optimizations for faster single-request latency
        - --disable-log-requests
        - --max-num-seqs
        - "128"
        - --block-size
        - "16"
        # Trust remote code for model flexibility
        - --trust-remote-code
        resources:
          requests:
            nvidia.com/mig-1g.18gb: "1"
          limits:
            nvidia.com/mig-1g.18gb: "1"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 180
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 10
          timeoutSeconds: 10
      volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: vllm-model-cache
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-optimized-gemma4
  namespace: user-sbowerma
  labels:
    app: vllm-optimized-gemma4
spec:
  selector:
    app: vllm-optimized-gemma4
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  type: ClusterIP
