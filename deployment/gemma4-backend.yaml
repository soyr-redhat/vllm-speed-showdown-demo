apiVersion: apps/v1
kind: Deployment
metadata:
  name: gemma4-backend
  namespace: user-sbowerma
  labels:
    app: gemma4-backend
  annotations:
    image.openshift.io/triggers: '[{"from":{"kind":"ImageStreamTag","name":"gemma4-backend:latest"},"fieldPath":"spec.template.spec.containers[?(@.name==\"backend\")].image"}]'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gemma4-backend
  template:
    metadata:
      labels:
        app: gemma4-backend
    spec:
      containers:
      - name: backend
        image: image-registry.openshift-image-registry.svc:5000/user-sbowerma/gemma4-backend:latest
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: VLLM_STANDARD_URL
          valueFrom:
            configMapKeyRef:
              name: gemma4-config
              key: vllm-standard-url
        - name: VLLM_OPTIMIZED_URL
          valueFrom:
            configMapKeyRef:
              name: gemma4-config
              key: vllm-optimized-url
        - name: VLLM_QUANTIZED_URL
          valueFrom:
            configMapKeyRef:
              name: gemma4-config
              key: vllm-quantized-url
        - name: VLLM_STANDARD_MODEL
          valueFrom:
            configMapKeyRef:
              name: gemma4-config
              key: vllm-standard-model
        - name: VLLM_OPTIMIZED_MODEL
          valueFrom:
            configMapKeyRef:
              name: gemma4-config
              key: vllm-optimized-model
        - name: VLLM_QUANTIZED_MODEL
          valueFrom:
            configMapKeyRef:
              name: gemma4-config
              key: vllm-quantized-model
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gemma4-backend
  namespace: user-sbowerma
  labels:
    app: gemma4-backend
spec:
  selector:
    app: gemma4-backend
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: gemma4-backend
  namespace: user-sbowerma
  labels:
    app: gemma4-backend
spec:
  to:
    kind: Service
    name: gemma4-backend
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
